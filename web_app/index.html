<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-ECU Simulator</title>
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body>
    
    <!-- INTERRUPTOR DE TEMA (MODO DÍA/NOCHE) - ESQUINA SUPERIOR DERECHA -->
    <div class="theme-switch-wrapper">
        <input type="checkbox" id="theme-toggle-checkbox" class="theme-checkbox-hidden">
        <span class="switch-icon sun-icon">☀️</span>
        <label for="theme-toggle-checkbox" class="theme-switch">
            <span class="slider round"></span>
        </label>
        <span class="switch-icon moon-icon">🌙</span>
    </div>

    <!-- CONTENEDOR PRINCIPAL (Rectángulo Horizontal) -->
    <div class="connection-bar" id="connection-bar">
        <div class="status-indicator" id="status-indicator"></div>
        <div class="bar-content">
            <span id="status-msg" class="status-text">SISTEMA DESCONECTADO</span>
            <div class="header-actions">
                <button id="main-action-btn" class="action-btn">ESCANEAR</button>
            </div>
        </div>
        <!-- Capa de animación interior (oculta por defecto) -->
        <div class="energy-wave" id="energy-wave"></div>
    </div>

    <!-- FUTURO CONTENIDO (Se mostrará debajo de la barra al conectar) -->
    <div id="dashboard-content" class="disabled-dashboard dashboard-layout">
        
        <!-- PANEL DE SEÑALES Y ACELERADOR (IZQUIERDA) -->
        <div class="side-panel left-panel">
            <!-- CONTROLES DE MOTOR (ACELERADOR VERTICAL) -->
            <div class="engine-controls">
                <div class="slider-vertical-wrapper">
                    <input type="range" id="rpm-slider" min="0" max="8000" value="0" step="50" class="neon-slider" disabled>
                </div>
                <div class="slider-icon icon-rocket">🚀</div>
            </div>

            <!-- BOTONES -->
            <div class="signal-controls">
                <h3 class="panel-title">SELECTOR DE SEÑAL</h3>
                <div class="signal-grid-2x3">
                    <button class="cyber-btn active" data-signal="ckp">
                        <div class="led-dot"></div>
                        <div class="btn-icon icon-spin">⚙️</div>
                        <div class="btn-label">CKP</div>
                        <div class="btn-desc">BOSCH 60-2</div>
                    </button>
                    <button class="cyber-btn" data-signal="hall">
                        <div class="led-dot"></div>
                        <div class="btn-icon icon-pulse">⚡</div>
                        <div class="btn-label">AUX 1</div>
                        <div class="btn-desc">HALL SIMPLE</div>
                    </button>
                    <button class="cyber-btn" data-signal="cmp">
                        <div class="led-dot"></div>
                        <div class="btn-icon icon-wiggle">🔧</div>
                        <div class="btn-label">AUX 2</div>
                        <div class="btn-desc">CMP (LEVAS)</div>
                    </button>
                    <button class="cyber-btn" data-signal="aux3">
                        <div class="led-dot"></div>
                        <div class="btn-icon icon-float">💎</div>
                        <div class="btn-label">AUX 3</div>
                        <div class="btn-desc">DISPONIBLE</div>
                    </button>
                    <button class="cyber-btn" data-signal="aux4">
                        <div class="led-dot"></div>
                        <div class="btn-icon icon-spin">🌀</div>
                        <div class="btn-label">AUX 4</div>
                        <div class="btn-desc">DISPONIBLE</div>
                    </button>
                    <button class="cyber-btn" data-signal="aux5">
                        <div class="led-dot"></div>
                        <div class="btn-icon icon-pulse">🔥</div>
                        <div class="btn-label">AUX 5</div>
                        <div class="btn-desc">DISPONIBLE</div>
                    </button>
                </div>

                <!-- BOTÓN DE ARRANQUE (START STOP ENGINE) -->
                <div class="engine-start-panel">
                    <div class="start-btn-bezel">
                        <div class="start-btn-chrome-ring">
                            <button id="engine-start-btn" class="engine-start-btn">
                                <span class="btn-text btn-text-start">START</span>
                                <span class="btn-text btn-text-stop">STOP</span>
                                <span class="btn-text btn-text-engine">ENGINE</span>
                            </button>
                        </div>
                        <div class="bezel-bottom">
                            <div class="status-led-bar" id="start-btn-led"></div>
                            <div class="a-off-btn">
                                <span class="a-off-icon">Ⓐ</span> <span class="a-off-text">OFF</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PANEL DE SEÑALES CKP FLOTANTE (Acoplado justo debajo) -->
                <div id="ckp-floating-panel" class="ckp-floating-panel">
                    <div class="panel-header">
                        <h3>SEÑALES CKP</h3>
                        <button id="close-panel-btn" class="close-btn">&times;</button>
                    </div>
                    <div class="panel-body">
                        <!-- VISTA 1: LISTADO DE SEÑALES -->
                        <div id="ckp-list-view" class="panel-view">
                            <p class="panel-subtitle">SELECCIONA UN PATRÓN</p>
                            <!-- Lista de señales configuradas -->
                            <div class="ckp-signals-list" id="ckp-signals-list">
                                <!-- Se llenará dinámicamente con JS -->
                            </div>
                            <button id="go-to-add-btn" class="modal-add-btn-wide">NUEVA SEÑAL +</button>
                        </div>
                        
                        <!-- VISTA 2: FORMULARIO DE AGREGAR -->
                        <div id="ckp-add-view" class="panel-view" style="display: none;">
                            <div class="back-row" id="back-to-list-btn">
                                <span>←</span> <span>VOLVER AL LISTADO</span>
                            </div>
                            <div class="add-signal-form" style="border-top: none; padding-top: 0;">
                                <div class="form-vertical">
                                    <!-- Campo Marca -->
                                    <div class="form-group">
                                        <label for="new-signal-brand" class="form-label">MARCA O NOMBRE</label>
                                        <input type="text" id="new-signal-brand" placeholder="Ej: FORD, RENAULT..." maxlength="12">
                                    </div>
                                    
                                    <!-- Campos Numéricos lado a lado -->
                                    <div class="form-row-numbers">
                                        <div class="form-group flex-1">
                                            <label for="new-signal-teeth" class="form-label">DIENTES (N)</label>
                                            <input type="number" id="new-signal-teeth" placeholder="Total" min="1" max="120">
                                        </div>
                                        <div class="form-group flex-1">
                                            <label for="new-signal-missing" class="form-label">FALTANTES (M)</label>
                                            <input type="number" id="new-signal-missing" placeholder="Vacíos" min="0" max="10">
                                        </div>
                                    </div>
                                    
                                    <button id="add-signal-btn" class="modal-add-btn-wide" style="margin-top: 4px;">AGREGAR PATRÓN</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TACÓMETRO (CENTRO) -->
        <div class="tacho-wrapper">
            <div class="tacho-container">
                <img src="tacho_on.png" alt="Tacómetro" class="tacho-bg">
                
                <!-- Aguja central brillante -->
                <div class="cyber-needle-container" id="tacho-needle">
                    <div class="cyber-needle"></div>
                    <div class="needle-center"></div>
                </div>

                <!-- Display Digital Central -->
                <div class="rpm-group">
                    <div class="cyber-rpm-display">
                        <span id="rpm-val">0</span>
                    </div>
                    <span class="cyber-rpm-label">RPM</span>
                </div>
            </div>
        </div>

        <!-- CONTENEDOR VACÍO DE EQUILIBRIO (DERECHA) -->
        <div class="side-panel right-panel">
            <!-- Vacío para equilibrar el flexbox y centrar perfectamente el tacómetro -->
        </div>

    <!-- MODAL DE CONFIRMACIÓN PREMIUM PERSONALIZADO -->
    <div id="cyber-confirm-modal" class="cyber-modal-container">
        <div class="cyber-modal-content">
            <div class="cyber-modal-header">
                <h3>ADVERTENCIA DE SEGURIDAD</h3>
            </div>
            <div class="cyber-modal-body">
                <p id="cyber-confirm-message">¿Está seguro de que desea eliminar esta señal?</p>
            </div>
            <div class="cyber-modal-footer">
                <button id="cyber-confirm-cancel" class="cyber-modal-btn cancel">CANCELAR</button>
                <button id="cyber-confirm-accept" class="cyber-modal-btn accept">ELIMINAR</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=14"></script>
</body>
</html>
